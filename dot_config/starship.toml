palette = "catppuccin_mocha"
add_newline = true

format = "$directory$git_branch$git_status${custom.github_profile}$fill$nodejs$python$cmd_duration$line_break$character"

[directory]
style = "bold lavender"
truncation_length = 4
truncate_to_repo = false

[git_branch]
symbol = "git "
style = "bold mauve"

[git_status]
style = "bold peach"

[custom.github_profile]
command = "git config --local --get github.profile"
when = "git config --local --get github.profile >/dev/null 2>&1"
format = "[ $symbol$output]($style)"
symbol = "gh:"
style = "bold sapphire"

[fill]
symbol = " "

[nodejs]
symbol = "node "
style = "green"

[python]
symbol = "py "
style = "yellow"

[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "overlay1"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

